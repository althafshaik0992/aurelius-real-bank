<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head><meta charset="UTF-8"><title>Error — Aurelius</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Georgia,serif;background:#060d18;color:#e8edf3;min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center}
.wrap{max-width:480px;padding:40px}
.icon{font-size:56px;margin-bottom:16px}
h1{font-size:24px;margin-bottom:10px;color:#C9A84C}
p{font-family:sans-serif;font-size:14px;color:#6b7a8d;line-height:1.7;margin-bottom:24px}
a{display:inline-block;background:#C9A84C;color:#060d18;padding:12px 28px;font-family:sans-serif;font-size:11px;letter-spacing:0.15em;font-weight:700;text-decoration:none}
</style>
</head>
<body>
<div class="wrap">
  <div class="icon">⚠️</div>
  <h1>Something went wrong</h1>
  <p>An unexpected error occurred. Please try again or return to the home page.</p>
  <a href="/">RETURN HOME</a>
</div>
</body>
</html>
